name: Build and deploy .NET Core application to Web App blazoruidemo20251223130817
on:
  push:
    branches:
    - dev/preview
permissions:
  id-token: write
  contents: read
env:
  AZURE_WEBAPP_NAME: blazoruidemo20251223130817
  AZURE_WEBAPP_PACKAGE_PATH: demo\NeoUI.Demo.Auto\published
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 10.0.x
  WORKING_DIRECTORY: demo\NeoUI.Demo.Auto
  AZURE_WEBAPP_SLOT_NAME: preview
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Tailwind CSS (npm)
      run: npm install
      working-directory: demo\NeoUI.Demo.Shared
    - name: Build CSS
      run: npm run build:css
      working-directory: demo\NeoUI.Demo.Shared
    - name: Install NeoUI.Blazor npm packages
      run: npm install
      working-directory: src\NeoUI.Blazor
    - name: Build NeoUI.Blazor CSS
      run: npm run build:css
      working-directory: src\NeoUI.Blazor
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Test
      run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
  deploy:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
        slot-name: ${{ env.AZURE_WEBAPP_SLOT_NAME }}
